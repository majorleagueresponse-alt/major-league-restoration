backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Page Content"
    files:
      - file: "public/content/home.json"
        label: "Home Page"
        name: "home"
        fields:
          - label: "Global Settings"
            name: "global"
            widget: "object"
            fields:
              - {label: "Contact Phone Number", name: "phoneNumber", widget: "string"}
              - {label: "Company Email", name: "companyEmail", widget: "string", default: "info@majorleaguerestoration.com"}
              - {label: "Form Access Key (Get at Web3Forms.com)", name: "formAccessKey", widget: "string", default: "", required: false, hint: "Paste your Web3Forms access key here to enable email alerts"}

          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Title Line 1", name: "title1", widget: "string"}
              - {label: "Title Line 2", name: "title2", widget: "string"}
              - {label: "Tagline", name: "tagline", widget: "string"}
              - {label: "Subtitle", name: "subtitle", widget: "text"}

          - label: "About Us Section"
            name: "about"
            widget: "object"
            fields:
              - {label: "Show Section?", name: "show", widget: "boolean", default: true}
              - {label: "Header", name: "header", widget: "string", default: "The Major League Difference"}
              - {label: "Text", name: "text", widget: "text"}
              - {label: "Image", name: "image", widget: "image"}

          - label: "Services Section"
            name: "servicesSection"
            widget: "object"
            fields:
              - {label: "Show Section?", name: "show", widget: "boolean", default: true}
              - label: "Services List"
                name: "items"
                widget: "list"
                fields:
                  - {label: "Name", name: "name", widget: "string"}
                  - {label: "Description", name: "description", widget: "text"}

          - label: "Process Details (Road to Recovery)"
            name: "processSection"
            widget: "object"
            fields:
              - {label: "Show Section?", name: "show", widget: "boolean", default: true}
              - label: "Steps"
                name: "steps"
                widget: "list"
                fields:
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Description", name: "description", widget: "text"}
                  - {label: "Image", name: "image", widget: "image"}

          - label: "Insurance Section"
            name: "insuranceSection"
            widget: "object"
            fields:
              - {label: "Show Section?", name: "show", widget: "boolean", default: true}
              - {label: "Header", name: "header", widget: "string", default: "Insurance Claims"}
              - {label: "Text", name: "text", widget: "text"}

          - label: "Google & Yelp Customization"
            name: "reviews"
            widget: "object"
            fields:
              - {label: "Show Google?", name: "showGoogle", widget: "boolean", default: true}
              - {label: "Google Link", name: "googleLink", widget: "string", required: false}
              - {label: "Show Yelp?", name: "showYelp", widget: "boolean", default: true}
              - {label: "Yelp Link", name: "yelpLink", widget: "string", required: false}

          - label: "Recent Victories (Homepage)"
            name: "victoriesSection"
            widget: "object"
            fields:
              - {label: "Show Section?", name: "show", widget: "boolean", default: true}
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - {label: "Image", name: "image", widget: "image"}
                  - {label: "Badge", name: "badge", widget: "string", required: false}
                  - {label: "Title", name: "title", widget: "string", required: false}
                  - {label: "Description", name: "description", widget: "string", required: false}

          - label: "Client Testimonials"
            name: "testimonialsSection"
            widget: "object"
            fields:
              - {label: "Show Section?", name: "show", widget: "boolean", default: true}
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - {label: "Name", name: "name", widget: "string"}
                  - {label: "Quote", name: "quote", widget: "text"}
                  - {label: "Rating (1-5)", name: "rating", widget: "number", default: 5}

          - label: "Frequently Asked Questions"
            name: "faqSection"
            widget: "object"
            fields:
              - {label: "Show Section?", name: "show", widget: "boolean", default: true}
              - label: "Questions"
                name: "items"
                widget: "list"
                fields:
                  - {label: "Question", name: "question", widget: "string"}
                  - {label: "Answer", name: "answer", widget: "text"}

          - label: "Footer Section"
            name: "footerSection"
            widget: "object"
            fields:
              - {label: "Company Description", name: "description", widget: "text"}
              - {label: "License Number", name: "licenseNumber", widget: "string"}
              - label: "Service Areas"
                name: "serviceAreas"
                widget: "list"
                fields:
                  - {label: "City", name: "city", widget: "string"}

  - name: "gallery"
    label: "Gallery Projects"
    folder: "public/content/gallery"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - {label: "Visible on Site?", name: "visible", widget: "boolean", default: true}
      - {label: "Project Title", name: "title", widget: "string"}
      - {label: "Service Type", name: "serviceType", widget: "select", options: ["Water Damage", "Mold Remediation", "Build Back"]}
      - {label: "Short Description", name: "description", widget: "text"}
      - {label: "Before Image", name: "beforeImage", widget: "image", required: false}
      - {label: "After Image (or Main Image)", name: "image", widget: "image"}

  - name: "highlights"
    label: "Highlight Reels"
    folder: "public/content/highlights"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - {label: "Visible on Site?", name: "visible", widget: "boolean", default: true, required: false}
      - {label: "Image", name: "image", widget: "image"}
      - {label: "Title (Optional)", name: "title", widget: "string", required: false}
